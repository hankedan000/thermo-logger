<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>Control UI</title>
</head>
<body>
    <div id="statusDiv">
        <div>Server Status: <span id="serverConnectionStatusSpan"></span></div>
    </div>

    <script src="ReconnectingWebSocket.js"></script>
    <script>
        const serverConnectionStatusSpan = document.getElementById('serverConnectionStatusSpan');
        const ws = new ReconnectingWebSocket("ws://" + location.host);

        updateStatusSpan(serverConnectionStatusSpan, 'UNKNOWN', 'orange');

        function updateSpan(span, innerText, style='') {
            if (innerText) {
                span.innerText = innerText;
            }
            if (style) {
                span.style = style;
            }
        }

        function updateStatusSpan(span, text, color='black', bolded=true) {
            let styleText = `color:${color};`;
            if (bolded) {
                styleText += ' font-weight:bold;';
            }
            updateSpan(span, text, styleText);
        }

        // WebSocket handlers
        ws.onconnect = () => {
            updateStatusSpan(serverConnectionStatusSpan, 'CONNECTED', 'green');

            ws.addEventListener('message', (event) => {
                let msg = JSON.parse(event.data);
                console.log(msg);
            });

            ws.addEventListener('close', () => {
                updateStatusSpan(serverConnectionStatusSpan, 'DISCONNECTED', 'red');
            });
        };
    </script>
</body>
